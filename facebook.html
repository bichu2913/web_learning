<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Login</title>
</head>

<body>

    <!-- Main Container -->
    <table width="100%">
        <tr>

            <!-- Left Side -->
            <td width="55%" valign="top">

                <img src="assets/images/facebooklogo.jpeg" alt="Facebook Logo" width="70">

                <br><br>

                <img src="assets/images/facebookbanner.webp" alt="Facebook Banner" width="500">

                <h1>
                    Explore <br>
                    the <br>
                    things <br>
                    <font color="blue">you love.</font>
                </h1>

            </td>

            <!-- Right Side -->
            <td width="45%" valign="top">

                <h2>Log in to Facebook</h2>

                <form>

                    <input type="email"
                        placeholder="Email address or mobile number"
                        size="50">

                    <br><br>

                    <input type="password"
                        placeholder="Password"
                        size="50">

                    <br><br>

                    <input type="submit" value="Log in">

                    <br><br>

                    <a href="#">Forgotten password?</a>

                    <br><br><br>

                    <button type="button">
                        Create new account
                    </button>

                </form>

                <br><br>

                <img src="assets/images/metalogo1.jpeg"
                    alt="Meta Logo"
                    width="70">

            </td>

        </tr>
    </table>

    <hr>

    <footer>

        <p align="center">
            English (UK) |
            മലയാളം |
            हिन्दी |
            தமிழ் |
            తెలుగు |
            ಕನ್ನಡ
        </p>

        <p align="center">
            Meta © 2026
        </p>

    </footer>

</body>

</html>
