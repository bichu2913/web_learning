<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Product Page</title>

    <link rel="stylesheet" href="assets/css/productscetion.css">
</head>

<body>

    <h1>Featured Products</h1>

    <section class="products">

        <!-- Card 1 -->
        <div class="card">

            <span class="sale">SALE</span>

            <div class="image-box">
                <img src="assets/images/airmax.webp" alt="Nike Air Max">
            </div>

            <div class="content">

                <h2>Nike Air Max</h2>

                <h3>₹4,999</h3>

                <button>Add to Cart</button>

            </div>

        </div>

        <!-- Card 2 -->

        <div class="card">

            <span class="sale">SALE</span>

            <div class="image-box">
                <img src="assets/images/wireless.jpg" alt="">
            </div>

            <div class="content">

                <h2>Wireless Headphone</h2>

                <h3>₹2,499</h3>

                <button>Add to Cart</button>

            </div>

        </div>

        <!-- Card 3 -->

        <div class="card">

            <span class="sale">SALE</span>

            <div class="image-box">
                <img src="assets/images/watch.jpg" alt="">
            </div>

            <div class="content">

                <h2>Smart Watch</h2>

                <h3>₹3,999</h3>

                <button>Add to Cart</button>

            </div>

        </div>

        <!-- Card 4 -->

        <div class="card">

            <span class="sale">SALE</span>

            <div class="image-box">
                <img src="assets/images/bspeaker.jpeg" alt="">
            </div>

            <div class="content">

                <h2>Bluetooth Speaker</h2>

                <h3>₹1,999</h3>

                <button>Add to Cart</button>

            </div>

        </div>

        <!-- Card 5 -->

        <div class="card">

            <span class="sale">SALE</span>

            <div class="image-box">
                <img src="assets/images/mouse.jpg" alt="">
            </div>

            <div class="content">

                <h2>Gaming Mouse</h2>

                <h3>₹1,499</h3>

                <button>Add to Cart</button>

            </div>

        </div>

    </section>

</body>

</html>
